# ── Connectivity ──────────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ── Bluetooth Profiles (3 slots) ───────────────────────────────
CONFIG_BT_MAX_PAIRED=3
CONFIG_BT_MAX_CONN=3

# ── OLED Display ───────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ── RGB Underglow (per-key LEDs) ───────────────────────────────
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
# Default effect on startup (0=solid, 1=breathe, 2=spectrum, 3=swirl, etc.)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
# Default HSB color: full white at 20% brightness (easy on the eyes)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20
# Turn LEDs off when display sleeps (saves battery)
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# ── Battery Reporting ──────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y

# ── Logging (disable in production) ───────────────────────────
CONFIG_ZMK_USB_LOGGING=n