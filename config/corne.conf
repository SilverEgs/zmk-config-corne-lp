# ── Connectivity ───────────────────────────────────────────────
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ── Bluetooth Profiles (3 slots) ───────────────────────────────
CONFIG_BT_MAX_PAIRED=3
CONFIG_BT_MAX_CONN=3

# ── OLED Display ───────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# ── RGB LEDs ───────────────────────────────────────────────────
# DISABLED: WS2812B underglow LEDs not yet installed.
# The Corne v3 data chain runs controller → WS2812B → SK6812MINI-E,
# so per-key LEDs cannot function without the underglow LEDs in place.
# To re-enable: install WS2812B LEDs, then uncomment the lines below
# and also uncomment the led_strip and chosen sections in corne.overlay.
#
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
# CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
# CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=0
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# ── External Power Control ─────────────────────────────────────
# Required for LEDs and OLED to receive power on nice!nano clones
CONFIG_ZMK_EXT_POWER=y

# ── Battery Reporting ──────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y

# ── Logging (disable in production) ───────────────────────────
CONFIG_ZMK_USB_LOGGING=n